# Statische Analyse – bewusst streng für hohe Wartbarkeit.
# Basis: flutter_lints, ergänzt um zusätzliche, sinnvolle Regeln.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Verstöße gegen diese Regeln sollen den Build/CI hart brechen.
    missing_required_param: error
    missing_return: error
    todo: info
  exclude:
    # Generierter Code (build_runner / riverpod_generator) wird nicht gelintet.
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Stil / Konsistenz
    - prefer_single_quotes
    - prefer_relative_imports
    - directives_ordering

    # const & Performance
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - prefer_final_in_for_each

    # Sicherheit / Korrektheit
    - always_declare_return_types
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - throw_in_finally
    - unawaited_futures
    - use_build_context_synchronously

    # API-Hygiene
    - require_trailing_commas
    - unnecessary_lambdas
    - use_super_parameters
